apiVersion: v1
kind: ConfigMap
metadata: 
  name: user
  namespace: roboshop
  labels:
    component: user
    project: roboshop
    tier: app
data:
  MONGO: "true"
  REDIS_URL: "redis://redis:6379"
  MONGO_URL: "mongodb://mongodb:27017/users"

--- 

apiVersion: apps/v1
kind: Deployment
metadata:
  name: user
  namespace: roboshop
  labels:
    component: user
    project: roboshop
    tier: app

spec:
  replicas: 1
  selector:
    matchLabels: 
      component: user
      project: roboshop
      tier: app

  template:
    metadata:
      labels: 
        component: user
        project: roboshop
        tier: app
    spec:
      containers:
      - name: user
        image: nareshkumar98/user:eecaa76f29983b7ed716f9a493bb4b5573ff502c
        envFrom:
        - configMapRef:
            name: user


---

apiVersion: v1
kind: Service
metadata:
  name: user # service name
  namespace: roboshop
  labels:
    component: user
    project: roboshop
    tier: app
spec:
  selector:
    component: user
    project: roboshop
    tier: app
  ports: 
  - name: http
    protocol:  TCP
    port: 8080 # service port
    targetPort: 8080 # container port


