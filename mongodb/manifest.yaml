apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: roboshop
  # deployment labels
  labels:
    component: mongodb
    project: roboshop
    tier: database
spec:
  replicas: 1
  # these are the labels replica set use to crete pod replicas, this should match pod labels 
  selector:
    matchLabels: 
      component: mongodb
      project: roboshop
      tier: database
  # This is pod definition
  template:
    metadata: 
      labels: 
        component: mongodb
        project: roboshop
        tier: database
    spec:
      containers:
      - name: mongodb
        image: nareshkumar98/mongodb:eecaa76f29983b7ed716f9a493bb4b5573ff502c
  
---

apiVersion: v1
kind: Service
metadata:
  name: mongodb # service name
  namespace: roboshop
  labels:
    component: mongodb
    project: roboshop
    tier: database
spec:
  selector:
    component: mongodb
    project: roboshop
    tier: database
  ports:
  - protocol:  TCP
    port: 27017 # service port
    targetPort: 27017 # container port




